services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alfred
      POSTGRES_USER: coda
      POSTGRES_PASSWORD: alfred-api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # --- SEGURANÇA ---
      WAHA_API_KEY: "alfred-secret-key"
      WAHA_PRINT_QR: "true"
      
      # --- WEBHOOK AUTOMÁTICO ---
      # Aqui dizemos ao WAHA para onde enviar as mensagens assim que ele subir
      WHATSAPP_HOOK_URL: "http://host.docker.internal:8080/webhook/waha"
      WHATSAPP_HOOK_EVENTS: "message"
      
      TZ: "America/Sao_Paulo"

volumes:
  postgres_data:
